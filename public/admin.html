<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OVERSEER - OnionCloud Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #111; --main-black: #000; --card-bg: #fff; --accent-primary: #6a0dad; --accent-secondary: #ccff00; --accent-tertiary: #ff003c; --font-head: 'Space Grotesk', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-head); background-color: var(--bg-color); color: var(--card-bg); min-height: 100vh; padding: 20px; background-image: linear-gradient(rgba(204,255,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(204,255,0,0.05) 1px, transparent 1px); background-size: 30px 30px; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: var(--card-bg); padding: 30px; border: 4px solid var(--accent-secondary); box-shadow: 10px 10px 0 var(--accent-primary); width: 90%; max-width: 400px; text-align: center; }
        .login-box h2 { color: var(--main-black); font-weight: 900; margin-bottom: 20px; }
        .cyber-input { width: 100%; padding: 15px; border: 3px solid var(--main-black); font-family: var(--font-mono); font-size: 1rem; font-weight: bold; margin-bottom: 15px; outline: none; background: #f0f0f0; }
        .cyber-input:focus { background: #fff; border-color: var(--accent-primary); }
        .cyber-btn { width: 100%; padding: 15px; border: 3px solid var(--main-black); background: var(--accent-secondary); color: var(--main-black); font-family: var(--font-head); font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 4px 4px 0 var(--main-black); transition: 0.1s; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .cyber-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0; }
        #adminDashboard { display: none; max-width: 1200px; margin: 0 auto; }
        .header { border-bottom: 4px solid var(--accent-secondary); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { font-size: 2.5rem; color: var(--accent-secondary); font-weight: 900; letter-spacing: -1px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--main-black); border: 3px solid var(--accent-secondary); padding: 20px; box-shadow: 6px 6px 0 var(--accent-primary); }
        .stat-card h3 { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; font-family: var(--font-mono); }
        .stat-card .val { font-size: 2.5rem; color: var(--card-bg); font-weight: 900; }
        .table-container { width: 100%; overflow-x: auto; margin-bottom: 40px; background: var(--card-bg); border: 3px solid var(--main-black); box-shadow: 8px 8px 0 var(--accent-primary); }
        table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.9rem; color: var(--main-black); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 2px solid #ddd; }
        th { background: #f0f0f0; font-weight: bold; border-bottom: 3px solid var(--main-black); white-space: nowrap; }
        .badge { padding: 4px 8px; font-size: 0.8rem; font-weight: bold; background: var(--main-black); color: var(--accent-secondary); border-radius: 4px; }
        .link-btn { background: var(--accent-primary); color: white; padding: 5px 10px; cursor: pointer; border: 2px solid var(--main-black); font-weight: bold; font-family: var(--font-head); display: inline-block; text-decoration: none; }
        .link-btn.danger { background: var(--accent-tertiary); }
        .section-title { background: var(--accent-secondary); color: var(--main-black); display: inline-block; padding: 5px 15px; font-weight: 900; margin-bottom: 15px; border: 2px solid var(--main-black); }
        
        #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; }
        .modal-box { background: var(--card-bg); padding: 20px; border: 4px solid var(--accent-secondary); box-shadow: 8px 8px 0 var(--accent-primary); width: 90%; max-width: 400px; color: var(--main-black); }
        .modal-box h3 { margin-bottom: 15px; font-weight: 900; border-bottom: 2px solid var(--main-black); padding-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2>OVERSEER LOGIN</h2>
            <input type="text" id="adminUser" class="cyber-input" style="text-align:center;" placeholder="USERNAME" autocomplete="off">
            <input type="password" id="adminPass" class="cyber-input" style="text-align:center;" placeholder="PASSWORD">
            <button id="loginBtn" onclick="attemptLogin()" class="cyber-btn"><i class="fas fa-lock-open"></i> AUTHORIZE</button>
            <p id="loginError" style="color: var(--accent-tertiary); margin-top: 15px; font-weight: bold; display: none;"></p>
        </div>
    </div>

    <div id="adminDashboard">
        <div class="header">
            <div><h1>ONION.OVERSEER</h1><span style="font-family: var(--font-mono); color: #888;">System Administration Node</span></div>
            <button id="refreshBtn" onclick="refreshData()" class="cyber-btn" style="width: auto; padding: 10px 20px; font-size: 1rem;"><i class="fas fa-sync-alt"></i> REFRESH</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>REGISTERED CLIENTS</h3><div class="val"><i class="fas fa-users"></i> <span id="totalUsers">0</span></div></div>
            <div class="stat-card"><h3>TOTAL MEDIA UPLOADED</h3><div class="val"><i class="fas fa-cloud-upload-alt"></i> <span id="totalUploads">0</span></div></div>
        </div>

        <h2 class="section-title"><i class="fas fa-ticket-alt"></i> REDEEM CODES</h2>
        <div style="display:flex; gap:10px; margin-bottom: 15px;">
            <input type="text" id="newCodeName" class="cyber-input" placeholder="CODE (e.g. FREE10)" style="margin:0; text-transform: uppercase;">
            <input type="number" id="newCodeValue" class="cyber-input" placeholder="COIN REWARD" style="margin:0;">
            <button onclick="adminAction('create_code')" class="cyber-btn" style="width: auto; padding:0 20px;"><i class="fas fa-plus"></i> CREATE</button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>CODE</th><th>REWARD (COINS)</th><th>ACTION</th></tr></thead>
                <tbody id="codesTableBody"></tbody>
            </table>
        </div>

        <h2 class="section-title"><i class="fas fa-address-card"></i> CLIENT MANAGEMENT</h2>
        <div class="table-container">
            <table>
                <thead><tr><th>USER ID</th><th>TIER</th><th>COINS</th><th>LAST LOGIN</th><th>ACTION</th></tr></thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>

        <h2 class="section-title"><i class="fas fa-database"></i> RECENT UPLOADS</h2>
        <div class="table-container">
            <table>
                <thead><tr><th>TIME (WIB)</th><th>USER ID</th><th>FILE NAME</th><th>SIZE</th><th>LINK</th></tr></thead>
                <tbody id="uploadsTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="editModal">
        <div class="modal-box">
            <h3>EDIT USER: <span id="editTargetId" style="color: var(--accent-primary);"></span></h3>
            <label style="font-family: var(--font-mono); font-weight: bold;">ADJUST COINS:</label>
            <input type="number" id="editCoins" class="cyber-input" style="padding: 10px; font-size:1rem;">
            
            <label style="font-family: var(--font-mono); font-weight: bold;">MEMBERSHIP TIER:</label>
            <select id="editTier" class="cyber-input" style="padding: 10px; font-size:1rem; cursor:pointer;">
                <option value="Free">Free (3 Coins/Day)</option>
                <option value="VIP">VIP (10 Coins/Day)</option>
                <option value="VVIP">VVIP (20 Coins/Day)</option>
                <option value="VVIP+">VVIP+ (30 Coins/Day)</option>
            </select>
            
            <div style="display:flex; gap:10px;">
                <button onclick="adminAction('edit_user')" class="cyber-btn" style="padding: 10px; font-size: 1rem;"><i class="fas fa-save"></i> SAVE</button>
                <button onclick="closeModal()" class="cyber-btn" style="padding: 10px; font-size: 1rem; background: #ccc; color: #333;"><i class="fas fa-times"></i> CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        let sessionUser = "", sessionPass = "";

        async function attemptLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if (!user || !pass) return;

            document.getElementById('loginBtn').innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
            try {
                const res = await fetch('/api/admin/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pass }) });
                if (res.ok) {
                    sessionUser = user; sessionPass = pass;
                    document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('adminDashboard').style.display = 'block';
                    renderTables(await res.json());
                } else { alert("Kredensial Salah!"); }
            } catch (err) { alert("Server Offline"); }
            document.getElementById('loginBtn').innerHTML = `<i class="fas fa-lock-open"></i> AUTHORIZE`;
        }

        async function refreshData() {
            try {
                const res = await fetch('/api/admin/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: sessionUser, password: sessionPass }) });
                if (res.ok) renderTables(await res.json());
            } catch (err) { alert("Gagal mengambil data"); }
        }

        // FUNGSI MULTI-AKSI ADMIN
        async function adminAction(action, targetId = null) {
            let payload = { username: sessionUser, password: sessionPass, action: action };
            
            if (action === 'edit_user') {
                payload.targetId = document.getElementById('editTargetId').innerText;
                payload.newCoins = document.getElementById('editCoins').value;
                payload.newTier = document.getElementById('editTier').value;
            } else if (action === 'delete_user') {
                if(!confirm(`YAKIN HAPUS USER: ${targetId}?`)) return;
                payload.targetId = targetId;
            } else if (action === 'create_code') {
                payload.targetId = document.getElementById('newCodeName').value.toUpperCase();
                payload.codeValue = document.getElementById('newCodeValue').value;
                if(!payload.targetId || !payload.codeValue) return alert("Isi nama dan jumlah koin!");
            } else if (action === 'delete_code') {
                if(!confirm(`HAPUS KODE: ${targetId}?`)) return;
                payload.targetId = targetId;
            }

            try {
                const res = await fetch('/api/admin/action', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if(res.ok) { 
                    if(action==='edit_user') closeModal(); 
                    if(action==='create_code') { document.getElementById('newCodeName').value=''; document.getElementById('newCodeValue').value=''; }
                    refreshData(); 
                } else { alert("Gagal melakukan aksi!"); }
            } catch (err) { alert("Server error!"); }
        }

        function renderTables(data) {
            document.getElementById('totalUsers').innerText = data.users.length;
            document.getElementById('totalUploads').innerText = data.uploads.length;

            const uBody = document.getElementById('usersTableBody'); uBody.innerHTML = '';
            data.users.forEach(user => {
                let tierColor = user.tier === "Free" ? "#555" : (user.tier === "VIP" ? "#00bcd4" : (user.tier === "VVIP" ? "#ff9800" : "#ff003c"));
                uBody.innerHTML += `
                    <tr>
                        <td><strong>${user.id}</strong></td>
                        <td><span class="badge" style="background:${tierColor}; color:#fff;">${user.tier}</span></td>
                        <td><strong>${user.coins}</strong></td><td>${user.last_login}</td>
                        <td>
                            <button class="link-btn" onclick="openEditModal('${user.id}', ${user.coins}, '${user.tier}')"><i class="fas fa-edit"></i> MANAGE</button>
                            <button class="link-btn danger" onclick="adminAction('delete_user', '${user.id}')"><i class="fas fa-trash"></i> DELETE</button>
                        </td>
                    </tr>`;
            });

            const cBody = document.getElementById('codesTableBody'); cBody.innerHTML = '';
            data.codes.forEach(code => {
                cBody.innerHTML += `
                    <tr>
                        <td><strong style="font-size:1.2rem; color:var(--accent-primary);">${code.id}</strong></td>
                        <td><strong>${code.value} <i class="fas fa-coins text-accent-secondary"></i></strong></td>
                        <td><button class="link-btn danger" onclick="adminAction('delete_code', '${code.id}')"><i class="fas fa-trash"></i> DELETE</button></td>
                    </tr>`;
            });

            const upBody = document.getElementById('uploadsTableBody'); upBody.innerHTML = '';
            data.uploads.forEach(up => {
                const date = new Date(up.timestamp).toLocaleString("id-ID", {timeZone: "Asia/Jakarta"});
                upBody.innerHTML += `<tr><td>${date}</td><td><span class="badge">${up.userId}</span></td><td><strong>${up.fileName}</strong></td><td>${up.fileSize}</td><td><a href="${up.url}" target="_blank" class="link-btn"><i class="fas fa-eye"></i> VIEW</a></td></tr>`;
            });
        }

        function openEditModal(userId, currentCoins, currentTier) {
            document.getElementById('editTargetId').innerText = userId;
            document.getElementById('editCoins').value = currentCoins;
            document.getElementById('editTier').value = currentTier;
            document.getElementById('editModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        document.getElementById("adminPass").addEventListener("keypress", function(e) { if (e.key === "Enter") attemptLogin(); });
    </script>
</body>
</html>
