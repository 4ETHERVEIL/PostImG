<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OVERSEER - OnionCloud Admin</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #111; --main-black: #000; --card-bg: #fff;
            --accent-primary: #6a0dad; --accent-secondary: #ccff00; --accent-tertiary: #ff003c;  
            --font-head: 'Space Grotesk', sans-serif; --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-head); background-color: var(--bg-color); color: var(--card-bg);
            min-height: 100vh; padding: 20px;
            background-image: linear-gradient(rgba(204,255,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(204,255,0,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: var(--card-bg); padding: 30px; border: 4px solid var(--accent-secondary); box-shadow: 10px 10px 0 var(--accent-primary); width: 90%; max-width: 400px; text-align: center; }
        .login-box h2 { color: var(--main-black); font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        .cyber-input { width: 100%; padding: 15px; border: 3px solid var(--main-black); font-family: var(--font-mono); font-size: 1rem; font-weight: bold; text-align: center; margin-bottom: 15px; outline: none; background: #f0f0f0; }
        .cyber-input:focus { background: #fff; border-color: var(--accent-primary); }
        .cyber-btn { width: 100%; padding: 15px; border: 3px solid var(--main-black); background: var(--accent-secondary); color: var(--main-black); font-family: var(--font-head); font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0 var(--main-black); transition: 0.1s; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .cyber-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0; }

        #adminDashboard { display: none; max-width: 1200px; margin: 0 auto; }
        .header { border-bottom: 4px solid var(--accent-secondary); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { font-size: 2.5rem; color: var(--accent-secondary); font-weight: 900; letter-spacing: -1px; }
        .header span { font-family: var(--font-mono); color: #888; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--main-black); border: 3px solid var(--accent-secondary); padding: 20px; box-shadow: 6px 6px 0 var(--accent-primary); }
        .stat-card h3 { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; font-family: var(--font-mono); }
        .stat-card .val { font-size: 2.5rem; color: var(--card-bg); font-weight: 900; }
        .stat-card .val i { color: var(--accent-secondary); font-size: 2rem; margin-right: 10px; }
        .section-title { background: var(--accent-secondary); color: var(--main-black); display: inline-block; padding: 5px 15px; font-weight: 900; margin-bottom: 15px; border: 2px solid var(--main-black); }
        .table-container { width: 100%; overflow-x: auto; margin-bottom: 40px; background: var(--card-bg); border: 3px solid var(--main-black); box-shadow: 8px 8px 0 var(--accent-primary); }
        table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.9rem; color: var(--main-black); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 2px solid #ddd; }
        th { background: #f0f0f0; font-weight: bold; border-bottom: 3px solid var(--main-black); white-space: nowrap; }
        tr:hover { background: #f9f9f9; }
        .badge { padding: 4px 8px; font-size: 0.8rem; font-weight: bold; background: var(--main-black); color: var(--accent-secondary); border-radius: 4px; }
        .link-btn { background: var(--accent-primary); color: white; padding: 5px 10px; text-decoration: none; font-weight: bold; font-family: var(--font-head); border: 2px solid var(--main-black); display: inline-block; }
        .link-btn:hover { background: var(--main-black); color: var(--accent-secondary); }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2><i class="fas fa-user-secret"></i> OVERSEER LOGIN</h2>
            
            <input type="text" id="adminUser" class="cyber-input" placeholder="USERNAME" autocomplete="off">
            <input type="password" id="adminPass" class="cyber-input" placeholder="PASSWORD">
            
            <button id="loginBtn" onclick="attemptLogin()" class="cyber-btn"><i class="fas fa-lock-open"></i> AUTHORIZE</button>
            <p id="loginError" style="color: var(--accent-tertiary); margin-top: 15px; font-weight: bold; display: none; font-family: var(--font-mono);"></p>
        </div>
    </div>

    <div id="adminDashboard">
        <div class="header">
            <div>
                <h1><i class="fas fa-eye"></i> ONION.OVERSEER</h1>
                <span>System Administration Node</span>
            </div>
            <button id="refreshBtn" onclick="refreshData()" class="cyber-btn" style="width: auto; padding: 10px 20px; font-size: 1rem;"><i class="fas fa-sync-alt"></i> REFRESH DATA</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>REGISTERED CLIENTS</h3>
                <div class="val"><i class="fas fa-users"></i> <span id="totalUsers">0</span></div>
            </div>
            <div class="stat-card">
                <h3>TOTAL MEDIA UPLOADED</h3>
                <div class="val"><i class="fas fa-cloud-upload-alt"></i> <span id="totalUploads">0</span></div>
            </div>
        </div>

        <h2 class="section-title"><i class="fas fa-database"></i> RECENT UPLOADS LOG</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>TIME (WIB)</th>
                        <th>USER ID</th>
                        <th>FILE NAME</th>
                        <th>SIZE</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="uploadsTableBody"></tbody>
            </table>
        </div>

        <h2 class="section-title"><i class="fas fa-address-card"></i> CLIENT DIRECTORY & COINS</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>USER ID (KTP)</th>
                        <th>REMAINING COINS</th>
                        <th>LAST LOGIN (WIB)</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let sessionUser = "";
        let sessionPass = "";

        async function attemptLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('loginBtn');
            const errorText = document.getElementById('loginError');

            if (!user || !pass) {
                errorText.innerText = "ERROR: ALL FIELDS REQUIRED";
                errorText.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> VERIFYING...`;
            errorText.style.display = 'none';

            try {
                // Tembak API Backend dengan Username & Password
                const res = await fetch('/api/admin/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    sessionUser = user;
                    sessionPass = pass;
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('adminDashboard').style.display = 'block';
                    renderTables(data);
                } else {
                    errorText.innerText = `ERROR: ${data.error}`;
                    errorText.style.display = 'block';
                }
            } catch (err) {
                errorText.innerText = "CRITICAL: SERVER OFFLINE";
                errorText.style.display = 'block';
            }

            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-lock-open"></i> AUTHORIZE`;
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> SYNCING...`;
            
            try {
                const res = await fetch('/api/admin/data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: sessionUser, password: sessionPass })
                });
                const data = await res.json();
                if (res.ok) renderTables(data);
            } catch (err) { alert("Failed to refresh data."); }
            
            btn.innerHTML = `<i class="fas fa-sync-alt"></i> REFRESH DATA`;
        }

        function renderTables(data) {
            document.getElementById('totalUsers').innerText = data.users.length;
            document.getElementById('totalUploads').innerText = data.uploads.length;

            const upBody = document.getElementById('uploadsTableBody');
            upBody.innerHTML = '';
            if(data.uploads.length === 0) {
                upBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No uploads yet.</td></tr>';
            } else {
                data.uploads.forEach(up => {
                    const date = new Date(up.timestamp).toLocaleString("id-ID", {timeZone: "Asia/Jakarta"});
                    upBody.innerHTML += `
                        <tr>
                            <td>${date}</td>
                            <td><span class="badge">${up.userId}</span></td>
                            <td><strong>${up.fileName}</strong></td>
                            <td>${up.fileSize}</td>
                            <td><a href="${up.url}" target="_blank" class="link-btn"><i class="fas fa-external-link-alt"></i> VIEW</a></td>
                        </tr>
                    `;
                });
            }

            const uBody = document.getElementById('usersTableBody');
            uBody.innerHTML = '';
            if(data.users.length === 0) {
                uBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No users registered.</td></tr>';
            } else {
                data.users.forEach(user => {
                    const coinColor = user.coins <= 0 ? 'var(--accent-tertiary)' : 'var(--main-black)';
                    uBody.innerHTML += `
                        <tr>
                            <td><span class="badge" style="font-size: 1rem;">${user.id}</span></td>
                            <td><strong style="font-size: 1.5rem; color: ${coinColor};">${user.coins}</strong> <i class="fas fa-coins text-accent-secondary"></i></td>
                            <td>${user.last_login}</td>
                        </tr>
                    `;
                });
            }
        }

        document.getElementById("adminPass").addEventListener("keypress", function(event) {
            if (event.key === "Enter") attemptLogin();
        });
    </script>
</body>
</html>
