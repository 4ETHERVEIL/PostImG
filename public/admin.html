<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OVERSEER - OnionCloud Admin</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #111; --main-black: #000; --card-bg: #fff; 
            --accent-primary: #6a0dad; --accent-secondary: #ccff00; --accent-tertiary: #ff003c; 
            --font-head: 'Space Grotesk', sans-serif; --font-mono: 'JetBrains Mono', monospace; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: var(--font-head); background-color: var(--bg-color); color: var(--card-bg); 
            min-height: 100vh; padding: 20px; 
            background-image: linear-gradient(rgba(204,255,0,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(204,255,0,0.05) 1px, transparent 1px); 
            background-size: 30px 30px; 
        }

        /* --- LOGIN OVERLAY --- */
        #loginOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 9999; display: flex; 
            align-items: center; justify-content: center; flex-direction: column; 
        }
        .login-box { 
            background: var(--card-bg); padding: 30px; border: 4px solid var(--accent-secondary); 
            box-shadow: 10px 10px 0 var(--accent-primary); width: 90%; max-width: 400px; text-align: center; 
        }
        .login-box h2 { color: var(--main-black); font-weight: 900; margin-bottom: 20px; }
        
        /* --- GLOBAL INPUTS & BUTTONS --- */
        .cyber-input { 
            width: 100%; padding: 15px; border: 3px solid var(--main-black); 
            font-family: var(--font-mono); font-size: 1rem; font-weight: bold; 
            margin-bottom: 15px; outline: none; background: #f0f0f0; transition: 0.2s;
        }
        .cyber-input:focus { background: #fff; border-color: var(--accent-primary); }
        .cyber-btn { 
            width: 100%; padding: 15px; border: 3px solid var(--main-black); 
            background: var(--accent-secondary); color: var(--main-black); 
            font-family: var(--font-head); font-weight: 900; font-size: 1.2rem; 
            cursor: pointer; box-shadow: 4px 4px 0 var(--main-black); 
            transition: 0.1s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .cyber-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0; }

        /* --- DASHBOARD LAYOUT --- */
        #adminDashboard { display: none; max-width: 1200px; margin: 0 auto; }
        .header { 
            border-bottom: 4px solid var(--accent-secondary); padding-bottom: 15px; 
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; 
            flex-wrap: wrap; gap: 15px;
        }
        .header h1 { font-size: 2.5rem; color: var(--accent-secondary); font-weight: 900; letter-spacing: -1px; margin: 0;}
        .header span { font-family: var(--font-mono); color: #888; display: block;}

        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .stat-card { 
            background: var(--main-black); border: 3px solid var(--accent-secondary); 
            padding: 20px; box-shadow: 6px 6px 0 var(--accent-primary); 
        }
        .stat-card h3 { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; font-family: var(--font-mono); }
        .stat-card .val { font-size: 2.5rem; color: var(--card-bg); font-weight: 900; }
        
        /* --- TAB NAVIGATION BAR --- */
        .tab-nav { 
            display: flex; gap: 5px; margin-bottom: 20px; 
            border-bottom: 4px solid var(--main-black); overflow-x: auto;
        }
        .tab-btn {
            background: #333; color: #fff; padding: 12px 20px;
            font-family: var(--font-mono); font-weight: bold; font-size: 1rem;
            border: 3px solid var(--main-black); border-bottom: none; cursor: pointer;
            text-transform: uppercase; white-space: nowrap; transition: 0.2s;
        }
        .tab-btn.active { background: var(--card-bg); color: var(--main-black); }
        .tab-btn:hover:not(.active) { background: #555; }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- TABLE STYLES --- */
        .table-container { 
            width: 100%; overflow-x: auto; margin-bottom: 50px; 
            background: var(--card-bg); border: 3px solid var(--main-black); 
            box-shadow: 8px 8px 0 var(--accent-primary); 
        }
        table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.9rem; color: var(--main-black); min-width: 700px; }
        th, td { padding: 15px; text-align: left; border-bottom: 2px solid #ddd; }
        th { background: #f0f0f0; font-weight: bold; border-bottom: 3px solid var(--main-black); white-space: nowrap; }
        tr:hover { background: #f9f9f9; }
        
        .badge { padding: 4px 8px; font-size: 0.8rem; font-weight: bold; background: var(--main-black); color: var(--accent-secondary); border-radius: 4px; }
        .action-btns { display: flex; gap: 8px; }
        .link-btn { 
            background: var(--accent-primary); color: white; padding: 6px 12px; 
            cursor: pointer; border: 2px solid var(--main-black); font-weight: bold; 
            font-family: var(--font-head); display: inline-flex; align-items: center; gap: 5px; text-decoration: none; font-size: 0.85rem;
        }
        .link-btn.danger { background: var(--accent-tertiary); }
        .link-btn:active { transform: translateY(2px); }

        .redeem-creator { display: grid; grid-template-columns: 2fr 1fr auto; gap: 10px; margin-bottom: 20px; }
        @media (max-width: 600px) { .redeem-creator { grid-template-columns: 1fr; } }
        
        /* --- MODAL --- */
        #editModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; 
        }
        .modal-box { 
            background: var(--card-bg); padding: 25px; border: 4px solid var(--accent-secondary); 
            box-shadow: 8px 8px 0 var(--accent-primary); width: 90%; max-width: 400px; color: var(--main-black); 
        }
        .modal-box h3 { margin-bottom: 20px; font-weight: 900; border-bottom: 3px solid var(--main-black); padding-bottom: 10px; }
        .modal-label { font-family: var(--font-mono); font-weight: bold; font-size: 0.85rem; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2><i class="fas fa-user-secret"></i> OVERSEER LOGIN</h2>
            <input type="text" id="adminUser" class="cyber-input" style="text-align:center;" placeholder="USERNAME" autocomplete="off">
            <input type="password" id="adminPass" class="cyber-input" style="text-align:center;" placeholder="PASSWORD">
            <button id="loginBtn" onclick="attemptLogin()" class="cyber-btn"><i class="fas fa-lock-open"></i> AUTHORIZE</button>
            <p id="loginError" style="color: var(--accent-tertiary); margin-top: 15px; font-weight: bold; font-family: var(--font-mono); display: none;"></p>
        </div>
    </div>

    <div id="adminDashboard">
        
        <div class="header">
            <div>
                <h1>ONION.OVERSEER</h1>
                <span>System Administration Node</span>
            </div>
            <button id="refreshBtn" onclick="refreshData()" class="cyber-btn" style="width: auto; padding: 10px 20px; font-size: 1rem;">
                <i class="fas fa-sync-alt"></i> REFRESH DATA
            </button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>REGISTERED CLIENTS</h3>
                <div class="val"><i class="fas fa-users"></i> <span id="totalUsers">0</span></div>
            </div>
            <div class="stat-card">
                <h3>TOTAL MEDIA UPLOADED</h3>
                <div class="val"><i class="fas fa-cloud-upload-alt"></i> <span id="totalUploads">0</span></div>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('tab-clients', this)"><i class="fas fa-address-card"></i> CLIENT DIRECTORY</button>
            <button class="tab-btn" onclick="switchTab('tab-codes', this)"><i class="fas fa-ticket-alt"></i> REDEEM CODES</button>
            <button class="tab-btn" onclick="switchTab('tab-logs', this)"><i class="fas fa-database"></i> MEDIA LOGS</button>
        </div>

        <div id="tab-clients" class="tab-content active">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>USER ID (KTP)</th>
                            <th>TIER</th>
                            <th>COINS</th>
                            <th>LAST LOGIN</th>
                            <th style="text-align: right;">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="5" style="text-align: center;">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="tab-codes" class="tab-content">
            <div class="redeem-creator">
                <input type="text" id="newCodeName" class="cyber-input" placeholder="CODE (e.g. FREE10)" style="margin:0; text-transform: uppercase;">
                <input type="number" id="newCodeValue" class="cyber-input" placeholder="COIN REWARD" style="margin:0;">
                <button onclick="adminAction('create_code')" class="cyber-btn" style="margin:0; width: 100%;"><i class="fas fa-plus"></i> CREATE CODE</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50%;">CODE ID</th>
                            <th>REWARD (COINS)</th>
                            <th style="text-align: right;">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="codesTableBody">
                        <tr><td colspan="3" style="text-align: center;">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="tab-logs" class="tab-content">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>TIME (WIB)</th>
                            <th>UPLOADER ID</th>
                            <th>FILE NAME</th>
                            <th>SIZE</th>
                            <th style="text-align: right;">PREVIEW</th>
                        </tr>
                    </thead>
                    <tbody id="uploadsTableBody">
                        <tr><td colspan="5" style="text-align: center;">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div id="editModal">
        <div class="modal-box">
            <h3><i class="fas fa-user-edit"></i> EDIT USER</h3>
            <p style="font-family: var(--font-mono); font-size: 0.9rem; margin-bottom: 15px; border-bottom: 2px dashed #ccc; padding-bottom: 10px;">
                TARGET ID: <strong id="editTargetId" style="color: var(--accent-primary);"></strong>
            </p>
            
            <label class="modal-label">ADJUST COINS:</label>
            <input type="number" id="editCoins" class="cyber-input" style="padding: 10px;">
            
            <label class="modal-label">MEMBERSHIP TIER:</label>
            <select id="editTier" class="cyber-input" style="padding: 10px; cursor:pointer;">
                <option value="Free">Free (3 Coins/Day)</option>
                <option value="VIP">VIP (10 Coins/Day)</option>
                <option value="VVIP">VVIP (20 Coins/Day)</option>
                <option value="VVIP+">VVIP+ (30 Coins/Day)</option>
            </select>
            
            <div style="display:flex; gap:10px; margin-top: 10px;">
                <button onclick="adminAction('edit_user')" class="cyber-btn" style="padding: 10px; font-size: 1rem;"><i class="fas fa-save"></i> SAVE</button>
                <button onclick="closeModal()" class="cyber-btn" style="padding: 10px; font-size: 1rem; background: #ccc; color: #333;"><i class="fas fa-times"></i> CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        let sessionUser = "", sessionPass = "";

        // Fungsi Switch Tab Menu
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        async function attemptLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const errBox = document.getElementById('loginError');
            
            if (!user || !pass) {
                errBox.innerText = "ALL FIELDS ARE REQUIRED!";
                errBox.style.display = "block"; return;
            }

            document.getElementById('loginBtn').innerHTML = `<i class="fas fa-spinner fa-spin"></i> VERIFYING...`;
            errBox.style.display = "none";

            try {
                const res = await fetch('/api/admin/data', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ username: user, password: pass }) 
                });
                if (res.ok) {
                    sessionUser = user; sessionPass = pass;
                    document.getElementById('loginOverlay').style.display = 'none'; 
                    document.getElementById('adminDashboard').style.display = 'block';
                    renderTables(await res.json());
                } else { 
                    errBox.innerText = "ACCESS DENIED: INCORRECT CREDENTIALS";
                    errBox.style.display = "block"; 
                }
            } catch (err) { 
                errBox.innerText = "CRITICAL: SERVER IS OFFLINE";
                errBox.style.display = "block"; 
            }
            document.getElementById('loginBtn').innerHTML = `<i class="fas fa-lock-open"></i> AUTHORIZE`;
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> SYNCING`;
            try {
                const res = await fetch('/api/admin/data', { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ username: sessionUser, password: sessionPass }) 
                });
                if (res.ok) renderTables(await res.json());
            } catch (err) { alert("Data Synchronization Failed"); }
            btn.innerHTML = `<i class="fas fa-sync-alt"></i> REFRESH DATA`;
        }

        async function adminAction(action, targetId = null) {
            let payload = { username: sessionUser, password: sessionPass, action: action };
            
            if (action === 'edit_user') {
                payload.targetId = document.getElementById('editTargetId').innerText;
                payload.newCoins = document.getElementById('editCoins').value;
                payload.newTier = document.getElementById('editTier').value;
            } else if (action === 'delete_user') {
                if(!confirm(`WARNING: Are you sure you want to PERMANENTLY DELETE user ${targetId}?`)) return;
                payload.targetId = targetId;
            } else if (action === 'create_code') {
                payload.targetId = document.getElementById('newCodeName').value.trim().toUpperCase();
                payload.codeValue = document.getElementById('newCodeValue').value;
                if(!payload.targetId || !payload.codeValue) return alert("You must provide both Code Name and Reward Amount!");
            } else if (action === 'delete_code') {
                if(!confirm(`Delete reward code ${targetId}?`)) return;
                payload.targetId = targetId;
            }

            try {
                const res = await fetch('/api/admin/action', { 
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                if(res.ok) { 
                    if(action==='edit_user') closeModal(); 
                    if(action==='create_code') { document.getElementById('newCodeName').value=''; document.getElementById('newCodeValue').value=''; }
                    refreshData(); 
                } else { alert("Failed to execute server command!"); }
            } catch (err) { alert("Server connection lost!"); }
        }

        function renderTables(data) {
            document.getElementById('totalUsers').innerText = data.users.length;
            document.getElementById('totalUploads').innerText = data.uploads.length;

            // RENDER USERS
            const uBody = document.getElementById('usersTableBody'); uBody.innerHTML = '';
            if (data.users.length === 0) uBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No clients registered.</td></tr>`;
            data.users.forEach(user => {
                let tierColor = user.tier === "Free" ? "#555" : (user.tier === "VIP" ? "#00bcd4" : (user.tier === "VVIP" ? "#ff9800" : "#ff003c"));
                uBody.innerHTML += `
                    <tr>
                        <td><strong>${user.id}</strong></td>
                        <td><span class="badge" style="background:${tierColor}; color:#fff;">${user.tier}</span></td>
                        <td><strong style="font-size: 1.2rem;">${user.coins}</strong></td>
                        <td>${user.last_login}</td>
                        <td>
                            <div class="action-btns" style="justify-content: flex-end;">
                                <button class="link-btn" onclick="openEditModal('${user.id}', ${user.coins}, '${user.tier}')"><i class="fas fa-edit"></i></button>
                                <button class="link-btn danger" onclick="adminAction('delete_user', '${user.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });

            // RENDER CODES
            const cBody = document.getElementById('codesTableBody'); cBody.innerHTML = '';
            if (data.codes.length === 0) cBody.innerHTML = `<tr><td colspan="3" style="text-align:center;">No active codes found.</td></tr>`;
            data.codes.forEach(code => {
                cBody.innerHTML += `
                    <tr>
                        <td><strong style="font-size:1.1rem; color:var(--accent-primary);">${code.id}</strong></td>
                        <td><strong>${code.value} <i class="fas fa-coins text-accent-secondary"></i></strong></td>
                        <td style="text-align:right;"><button class="link-btn danger" onclick="adminAction('delete_code', '${code.id}')"><i class="fas fa-trash"></i> DELETE</button></td>
                    </tr>`;
            });

            // RENDER UPLOADS
            const upBody = document.getElementById('uploadsTableBody'); upBody.innerHTML = '';
            if (data.uploads.length === 0) upBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Server is empty.</td></tr>`;
            data.uploads.forEach(up => {
                const date = new Date(up.timestamp).toLocaleString("id-ID", {timeZone: "Asia/Jakarta"});
                upBody.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td><span class="badge">${up.userId}</span></td>
                        <td><strong>${up.fileName}</strong></td>
                        <td>${up.fileSize}</td>
                        <td style="text-align:right;"><a href="${up.url}" target="_blank" class="link-btn"><i class="fas fa-external-link-alt"></i> OPEN</a></td>
                    </tr>`;
            });
        }

        function openEditModal(userId, currentCoins, currentTier) {
            document.getElementById('editTargetId').innerText = userId;
            document.getElementById('editCoins').value = currentCoins;
            document.getElementById('editTier').value = currentTier;
            document.getElementById('editModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        
        // Enter = Login
        document.getElementById("adminPass").addEventListener("keypress", function(e) { if (e.key === "Enter") attemptLogin(); });
    </script>
</body>
</html>
