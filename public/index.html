<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#6a0dad">
    <title>OnionCloud - Cyber Media Storage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #e0e0e0; --main-black: #0a0a0a; --card-bg: #ffffff; --accent-primary: #6a0dad; --accent-secondary: #ccff00; --accent-tertiary: #ff5f00; --border-width: 3px; --font-head: 'Space Grotesk', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-head); background-color: var(--bg-color); color: var(--main-black); min-height: 100vh; overflow-x: hidden; background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px); background-size: 20px 20px; display: flex; align-items: center; justify-content: center; padding-bottom: 20px; }
        .bg-noise { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.04; pointer-events: none; z-index: -1; background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjZmZmIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMwMDAiLz4KPC9zdmc+'); }
        .floating-shape { position: fixed; z-index: -2; border: 2px solid var(--main-black); background: var(--accent-secondary); opacity: 0.6; }
        .shape-1 { width: 100px; height: 100px; top: 10%; left: -20px; border-radius: 50%; }
        .shape-2 { width: 150px; height: 150px; bottom: 20%; right: -40px; transform: rotate(45deg); background: var(--accent-primary); }
        .marquee-top { background: var(--main-black); color: var(--card-bg); padding: 8px 0; font-family: var(--font-mono); font-size: 0.7rem; font-weight: bold; border-bottom: var(--border-width) solid var(--accent-secondary); overflow: hidden; white-space: nowrap; position: fixed; top: 0; width: 100%; z-index: 999; }
        .marquee-content { display: inline-block; animation: scrollLeft 20s linear infinite; }
        .marquee-content span { margin-right: 25px; } .marquee-content i { margin: 0 8px; color: var(--accent-secondary); }
        @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .container { width: 100%; max-width: 500px; padding: 15px; margin-top: 40px; }
        .cyber-card { background: var(--card-bg); border: var(--border-width) solid var(--main-black); box-shadow: 8px 8px 0 var(--main-black); position: relative; overflow: hidden; }
        .cyber-card::before { content: '⬤'; position: absolute; top: 5px; left: 10px; font-size: 10px; color: rgba(0,0,0,0.3); pointer-events: none; }
        .cyber-card::after { content: '⬤'; position: absolute; bottom: 5px; right: 10px; font-size: 10px; color: rgba(0,0,0,0.3); pointer-events: none; }

        .dashboard-board { background: #111; padding: 15px; border-bottom: var(--border-width) solid var(--main-black); color: white; }
        .user-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .user-top-row .label { font-size: 9px; color: var(--accent-secondary); font-weight: 900; letter-spacing: 1px; display: block; margin-bottom: 3px; }
        .user-top-row .level { font-size: 1.1rem; font-weight: 900; color: white; display: flex; align-items: center; gap: 6px; }
        .id-badge { background: rgba(255,255,255,0.1); border: 1px solid var(--accent-primary); padding: 4px 10px; font-family: var(--font-mono); font-size: 12px; font-weight: bold; color: #fff; text-shadow: 0 0 5px var(--accent-primary); }
        
        .coin-box { background: var(--accent-primary); border: 2px solid var(--main-black); padding: 12px; text-align: center; box-shadow: 4px 4px 0 var(--main-black); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .coin-box .coin-label { font-size: 10px; font-weight: 900; letter-spacing: 1px; color: white; margin-bottom: 2px; }
        .coin-box .coin-value { font-size: 1.8rem; font-weight: 900; color: var(--accent-secondary); text-shadow: 2px 2px 0 #000; display: flex; align-items: center; gap: 8px; }
        
        /* KOTAK REDEEM BARU */
        .redeem-box { display: flex; gap: 5px; margin-top: 15px; }
        
        .card-body { padding: 20px; }
        .input-wrapper { position: relative; margin-bottom: 15px; }
        .input-label { font-family: var(--font-mono); font-weight: bold; font-size: 0.75rem; margin-bottom: 5px; display: block; color: var(--main-black); }
        .cyber-input { width: 100%; padding: 12px; border: 3px solid var(--main-black); background: #f4f4f4; font-family: var(--font-mono); font-size: 0.9rem; font-weight: bold; outline: none; transition: 0.2s; color: var(--main-black); }
        .cyber-input:focus { background: #fff; border-color: var(--accent-tertiary); }
        .file-label { display: flex; align-items: center; justify-content: center; cursor: pointer; text-align: center; border-style: dashed; }
        .file-label:hover { background: #fff; border-color: var(--accent-primary); color: var(--accent-primary); }

        .system-warning { background: var(--main-black); color: var(--accent-tertiary); padding: 8px 12px; border: 2px solid var(--accent-tertiary); font-family: var(--font-mono); font-size: 0.75rem; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; animation: pulse-border 2s infinite; }
        .system-warning i { font-size: 1rem; animation: blink 1s infinite; }
        .file-size-info { font-size: 0.7rem; color: #888; text-align: right; margin-top: -10px; margin-bottom: 15px; display: block; font-family: var(--font-mono); }
        .file-error { color: var(--accent-tertiary) !important; font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pulse-border { 0%, 100% { border-color: var(--accent-tertiary); } 50% { border-color: #550000; } }

        .cyber-button { width: 100%; padding: 14px; border: 3px solid var(--main-black); background: var(--accent-secondary); color: var(--main-black); font-family: var(--font-head); font-weight: 900; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; position: relative; overflow: hidden; box-shadow: 5px 5px 0 var(--main-black); transition: all 0.1s; margin-bottom: 8px; display: flex; justify-content: center; gap: 8px; align-items: center; }
        .cyber-button:active:not(:disabled) { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--main-black); }
        .cyber-button:hover:not(:disabled) { background: #bfff00; }
        .cyber-button:disabled { background: #ccc; cursor: not-allowed; box-shadow: 5px 5px 0 #888; border-color: #888; color: #555; transform: none; }
        .cyber-button.secondary { background: #fff; }

        #notification { position: fixed; top: 60px; right: 15px; padding: 10px 18px; border: 3px solid var(--main-black); font-weight: 900; box-shadow: 5px 5px 0 var(--main-black); transform: translateX(200%); transition: transform 0.3s; z-index: 1002; max-width: 90%; font-family: var(--font-head); font-size: 0.85rem; background: var(--card-bg); }
        #notification.show { transform: translateX(0); }
        .notif-success { background: var(--accent-secondary) !important; color: var(--main-black); }
        .notif-error { background: var(--accent-tertiary) !important; color: white; }
        #resultBox { display: none; margin-top: 20px; padding-top: 20px; border-top: 3px dashed var(--main-black); }
    </style>
</head>
<body>

    <div class="bg-noise"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <div class="marquee-top">
        <div class="marquee-content">
            <span><i class="fas fa-bolt"></i> ONIONCLOUD MEDIA NODE </span>
            <span><i class="fas fa-cube"></i> MAX PAYLOAD 4.5MB </span>
            <span><i class="fas fa-shield-alt"></i> SERVER-SIDE SECURITY </span>
            <span><i class="fas fa-coins"></i> 1 UPLOAD = 1 COIN </span>
        </div>
    </div>

    <div class="container">
        <div class="cyber-card">
            
            <div class="dashboard-board">
                <div class="user-top-row">
                    <div>
                        <span class="label">MEMBERSHIP</span>
                        <div class="level" id="userTierBox"><i class="fas fa-user-astronaut text-accent-secondary" style="color: var(--accent-secondary);"></i> <span style="color: var(--accent-secondary);">FREE USER</span></div>
                    </div>
                    <div style="text-align: right;">
                        <span class="label" style="color: var(--accent-tertiary);">VERIFIED ID</span>
                        <div class="id-badge" id="userIdBox">ONION-0000</div>
                    </div>
                </div>
                <div class="coin-box">
                    <span class="coin-label">NETWORK CREDITS (SALDO)</span>
                    <div class="coin-value">
                        <i class="fas fa-coins"></i> <span id="coinAmount" style="font-size: 2rem; color: var(--accent-secondary); font-weight: 900;">0</span> <span>COINS</span>
                    </div>
                </div>
                
                <div class="redeem-box">
                    <input type="text" id="redeemInput" class="cyber-input" style="margin:0; padding:10px; text-transform:uppercase;" placeholder="ENTER PROMO CODE">
                    <button id="redeemBtn" onclick="processRedeem()" class="cyber-button" style="margin:0; width:auto; padding:10px 15px;"><i class="fas fa-gift"></i></button>
                </div>
            </div>

            <div class="card-body">
                <form id="uploadForm">
                    <div class="input-wrapper">
                        <label class="input-label">📁 TARGET FILE (IMG/VID/GIF)</label>
                        <input type="file" id="fileInput" accept="image/*,video/*,.gif" class="hidden" style="display: none;" required>
                        <label for="fileInput" id="fileLabel" class="cyber-input file-label">
                            <i class="fas fa-folder-open" style="margin-right: 8px;"></i> SELECT MEDIA FILE
                        </label>
                    </div>
                    
                    <span id="sizeInfo" class="file-size-info">Selected Size: 0 MB / Max: 4.5 MB</span>

                    <div class="system-warning" id="sysWarning">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span id="warningText">WARNING: SYSTEM RESTRICTS FILE SIZES ABOVE 4.5MB.</span>
                    </div>

                    <button type="submit" id="btn" class="cyber-button">
                        <i class="fas fa-satellite-dish"></i> EXECUTE UPLOAD (-1 COIN)
                    </button>
                </form>

                <div id="resultBox">
                    <div class="input-wrapper">
                        <label class="input-label" style="color: var(--accent-primary);">✅ SUCCESS. LINK GENERATED:</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="urlInput" class="cyber-input" readonly>
                            <button type="button" onclick="copyText()" class="cyber-button secondary" style="width: 50px; margin: 0; padding: 0;">
                                <i class="far fa-copy"></i>
                            </button>
                        </div>
                    </div>
                    <a id="previewLink" href="#" target="_blank" style="text-decoration: none;">
                        <button type="button" class="cyber-button secondary" style="font-size: 0.9rem; padding: 10px;">
                            OPEN NEW TAB <i class="fas fa-external-link-alt" style="margin-left: 5px;"></i>
                        </button>
                    </a>
                    <button type="button" onclick="resetForm()" class="cyber-button" style="background: var(--main-black); color: white; font-size: 0.9rem; padding: 10px; margin-top: 8px;">
                        UPLOAD NEW FILE
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="notification"></div>

    <script>
        const input = document.getElementById('fileInput'); const fileLabel = document.getElementById('fileLabel');
        const form = document.getElementById('uploadForm'); const btn = document.getElementById('btn');
        const resultBox = document.getElementById('resultBox'); const urlInput = document.getElementById('urlInput');
        const previewLink = document.getElementById('previewLink'); const sizeInfo = document.getElementById('sizeInfo');
        const sysWarning = document.getElementById('sysWarning'); const warningText = document.getElementById('warningText');
        const coinAmountText = document.getElementById('coinAmount'); const userIdBox = document.getElementById('userIdBox');
        const userTierBox = document.getElementById('userTierBox');
        const MAX_SIZE_MB = 4.5; const MAX_SIZE_BYTES = MAX_SIZE_MB * 1024 * 1024;
        
        let clientId = localStorage.getItem('tele_client_id');
        if (clientId && clientId.startsWith('SYS-')) { clientId = clientId.replace('SYS-', 'ONION-'); localStorage.setItem('tele_client_id', clientId); }
        if (!clientId) { clientId = 'ONION-' + Math.floor(10000 + Math.random() * 90000); localStorage.setItem('tele_client_id', clientId); }
        userIdBox.innerText = clientId;

        let myCoins = 0; let countdownInterval;

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const now = new Date();
                const nowWIB = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Jakarta"}));
                const tomorrowWIB = new Date(nowWIB); tomorrowWIB.setHours(24, 0, 0, 0); 
                const diff = tomorrowWIB - nowWIB;

                if (diff <= 0) { clearInterval(countdownInterval); fetchCoinsFromServer(); return; }

                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');

                btn.innerHTML = `<i class="fas fa-hourglass-half fa-spin"></i> RECHARGE IN ${h}:${m}:${s}`;
                warningText.innerHTML = `ACCESS DENIED: Insufficient Credits. Server reset in <b>${h}:${m}:${s}</b>`;
            }, 1000);
        }

        async function fetchCoinsFromServer() {
            try {
                btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> CONNECTING SERVER...`;
                const res = await fetch(`/api/user/${clientId}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server error');
                
                myCoins = data.coins; coinAmountText.innerText = myCoins;
                const tierColors = { "Free": "var(--accent-secondary)", "VIP": "#00bcd4", "VVIP": "#ff9800", "VVIP+": "#ff003c" };
                const tColor = tierColors[data.tier] || tierColors["Free"];
                userTierBox.innerHTML = `<i class="fas fa-user-astronaut" style="color: ${tColor};"></i> <span style="color: ${tColor};">${data.tier.toUpperCase()} USER</span>`;

                if (data.isNewDay) { setTimeout(() => showNotification(`DAILY REWARD: +${data.resetAmount} COINS!`, 'success'), 1000); }
                checkCoinStatus();
            } catch (error) { showNotification(`ERROR: ${error.message}`, 'error'); btn.innerHTML = `<i class="fas fa-exclamation-triangle"></i> CONNECTION FAILED`; }
        }
        fetchCoinsFromServer(); 

        function checkCoinStatus() {
            if (myCoins <= 0) {
                btn.disabled = true; sysWarning.style.borderColor = "var(--accent-tertiary)"; sysWarning.style.color = "var(--accent-tertiary)";
                startCountdown(); 
            } else {
                if (countdownInterval) clearInterval(countdownInterval);
                btn.disabled = false; btn.innerHTML = `<i class="fas fa-satellite-dish"></i> EXECUTE UPLOAD (-1 COIN)`;
            }
        }

        // FITUR BARU: PROSES REDEEM KODE
        async function processRedeem() {
            const codeInput = document.getElementById('redeemInput');
            const codeVal = codeInput.value.trim();
            const rBtn = document.getElementById('redeemBtn');
            
            if(!codeVal) return showNotification('PLEASE ENTER A CODE', 'error');
            
            rBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;
            try {
                const res = await fetch('/api/redeem', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ clientId: clientId, code: codeVal })
                });
                const data = await res.json();
                if(res.ok) {
                    myCoins = data.newCoins; coinAmountText.innerText = myCoins;
                    showNotification(`REWARD CLAIMED: +${data.rewardAmount} COINS!`, 'success');
                    codeInput.value = '';
                    checkCoinStatus();
                } else {
                    showNotification(data.error, 'error');
                }
            } catch(e) { showNotification('SERVER ERROR', 'error'); }
            rBtn.innerHTML = `<i class="fas fa-gift"></i>`;
        }

        function showNotification(text, type = 'success') {
            const n = document.getElementById('notification');
            n.innerHTML = type === 'success' ? `<i class="fas fa-check-circle"></i> ${text}` : `<i class="fas fa-exclamation-triangle"></i> ${text}`;
            n.className = `notif-${type} show`;
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        input.onchange = () => { 
            const file = input.files[0];
            if(file) {
                const icon = file.type.startsWith('video') ? 'fa-film' : 'fa-file-image';
                fileLabel.innerHTML = `<i class="fas ${icon}" style="margin-right: 8px;"></i> ${file.name}`;
                fileLabel.style.borderColor = "var(--accent-primary)";
                const currentSizeMB = (file.size / (1024 * 1024)).toFixed(2);
                sizeInfo.innerHTML = `Selected Size: <strong>${currentSizeMB} MB</strong> / Max: ${MAX_SIZE_MB} MB`;

                if (file.size > MAX_SIZE_BYTES) {
                    sizeInfo.classList.add('file-error'); warningText.innerText = `ERROR: FILE EXCEEDS ${MAX_SIZE_MB}MB. DEPLOYMENT ABORTED.`;
                    btn.disabled = true; btn.innerHTML = `<i class="fas fa-lock"></i> SYSTEM LOCKED`;
                    if (countdownInterval) clearInterval(countdownInterval); 
                } else if (myCoins > 0) {
                    sizeInfo.classList.remove('file-error'); sysWarning.style.borderColor = "var(--accent-secondary)"; sysWarning.style.color = "var(--accent-secondary)";
                    warningText.innerText = "READY: FILE SIZE IS OPTIMAL. SAFE TO PROCEED."; btn.disabled = false; btn.innerHTML = `<i class="fas fa-satellite-dish"></i> EXECUTE UPLOAD (-1 COIN)`;
                } else { checkCoinStatus(); }
            } 
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (input.files[0].size > MAX_SIZE_BYTES || myCoins <= 0) return;
            btn.disabled = true; btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> TRANSMITTING...`; resultBox.style.display = 'none';

            const fd = new FormData(); fd.append('media', input.files[0]); fd.append('clientId', clientId); 
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                if (!res.ok) { showNotification(`ERROR: ${data.error || 'UPLOAD FAILED'}`, 'error'); return; }

                if(data.url) {
                    urlInput.value = data.url; previewLink.href = data.url; resultBox.style.display = 'block';
                    if(data.remainingCoins !== undefined) { myCoins = data.remainingCoins; coinAmountText.innerText = myCoins; }
                    showNotification('UPLOAD COMPLETE!', 'success');
                }
            } catch (err) { showNotification('ERROR: CONNECTION LOST', 'error'); } 
            finally { if(resultBox.style.display !== 'block') { checkCoinStatus(); } }
        };

        function copyText() { urlInput.select(); document.execCommand('copy'); showNotification('LINK COPIED TO CLIPBOARD', 'success'); }

        function resetForm() {
            form.reset(); fileLabel.innerHTML = `<i class="fas fa-folder-open" style="margin-right: 8px;"></i> SELECT MEDIA FILE`;
            fileLabel.style.borderColor = "var(--main-black)"; sysWarning.style.borderColor = "var(--accent-tertiary)"; sysWarning.style.color = "var(--accent-tertiary)";
            warningText.innerText = "WARNING: SYSTEM RESTRICTS FILE SIZES ABOVE 4.5MB."; sizeInfo.innerHTML = `Selected Size: 0 MB / Max: 4.5 MB`; sizeInfo.classList.remove('file-error');
            resultBox.style.display = 'none'; checkCoinStatus(); 
        }
    </script>
</body>
</html>
