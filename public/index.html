<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleCloud - Image Hosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; /* Hitam pekat khas Vercel */
            color: #ffffff;
            background-image: radial-gradient(circle at 50% 0%, #1a1a24 0%, transparent 50%);
        }
        /* Efek garis halus di sekitar card */
        .vercel-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .text-gradient {
            background: linear-gradient(180deg, #fff, #adadad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-blue-500 selection:text-white">

    <nav class="w-full flex items-center justify-between p-6 max-w-4xl mx-auto">
        <div class="flex items-center gap-2 font-bold text-lg tracking-tight">
            <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
            TeleCloud.
        </div>
        <a href="#" class="text-sm font-medium text-gray-400 hover:text-white transition">Github</a>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-4 w-full max-w-3xl mx-auto -mt-16">
        
        <div class="text-center mb-10 w-full">
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight mb-4 text-gradient">
                Simpan Gambar Anda.
            </h1>
            <p class="text-gray-400 text-lg md:text-xl font-medium max-w-xl mx-auto">
                Penyimpanan cloud gratis tanpa batas berbasis Telegram. Cepat, aman, dan tanpa iklan.
            </p>
        </div>

        <div class="w-full vercel-card rounded-2xl p-2 shadow-2xl transition-all duration-300">
            <form id="uploadForm" class="relative flex items-center w-full bg-[#111111] border border-white/10 rounded-xl overflow-hidden focus-within:border-white/30 focus-within:ring-1 focus-within:ring-white/30 transition-all">
                
                <input type="file" id="fileInput" accept="image/*" class="hidden" required>
                
                <label for="fileInput" class="flex-grow flex items-center h-14 px-4 cursor-pointer text-gray-400 hover:text-gray-200 transition">
                    <svg class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                    </svg>
                    <span id="fileName" class="truncate font-medium">Pilih gambar dari perangkat...</span>
                </label>

                <button type="submit" id="btn" class="h-10 px-6 mr-2 bg-white text-black font-semibold rounded-lg hover:bg-gray-200 transition active:scale-95 flex items-center justify-center shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
                    Upload
                </button>

                <div id="loader" class="hidden h-10 px-6 mr-2 bg-white text-black font-semibold rounded-lg flex items-center justify-center shrink-0">
                    <svg class="animate-spin h-5 w-5 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </div>
            </form>
        </div>

        <div id="result" class="w-full mt-6 hidden opacity-0 transition-opacity duration-500">
            <div class="vercel-card rounded-2xl p-6 flex flex-col items-center">
                <svg class="w-12 h-12 text-green-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h3 class="text-xl font-bold mb-4">Gambar Berhasil Diunggah!</h3>
                
                <div class="w-full relative flex items-center bg-[#111111] border border-white/10 rounded-xl p-1">
                    <input type="text" id="urlInput" readonly class="w-full bg-transparent border-none text-sm text-gray-300 px-4 focus:ring-0 outline-none">
                    <button onclick="copyText()" class="px-4 py-2 bg-[#222222] hover:bg-[#333333] text-white rounded-lg text-sm font-medium transition flex items-center gap-2 border border-white/5">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                        Copy
                    </button>
                </div>

                <div class="mt-4 flex gap-4 text-sm font-medium">
                    <a id="previewLink" href="#" target="_blank" class="text-gray-400 hover:text-white transition flex items-center gap-1">
                        Buka di tab baru
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                    </a>
                    <button onclick="resetForm()" class="text-gray-400 hover:text-white transition">Upload file lain</button>
                </div>
            </div>
        </div>

    </main>

    <footer class="py-6 text-center text-sm font-medium text-gray-600">
        Ditenagai oleh Vercel & Telegram Bot API
    </footer>

    <script>
        const input = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const form = document.getElementById('uploadForm');
        const btn = document.getElementById('btn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        const urlInput = document.getElementById('urlInput');
        const previewLink = document.getElementById('previewLink');

        // Mengubah teks saat gambar dipilih
        input.onchange = () => { 
            if(input.files[0]) {
                fileName.innerText = input.files[0].name;
                fileName.classList.add('text-white');
            } 
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // UI Loading State
            btn.classList.add('hidden');
            loader.classList.remove('hidden');
            result.classList.add('hidden');
            result.classList.remove('opacity-100');

            const fd = new FormData();
            fd.append('image', input.files[0]);

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                
                if(data.url) {
                    urlInput.value = data.url;
                    previewLink.href = data.url;
                    
                    // Show Result with smooth fade-in
                    result.classList.remove('hidden');
                    setTimeout(() => result.classList.add('opacity-100'), 50);
                } else {
                    alert("Gagal mendapatkan link!");
                }
            } catch (err) { 
                alert("Upload gagal! Periksa koneksi internet Anda."); 
            } finally {
                // Restore UI State
                btn.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        };

        function copyText() {
            urlInput.select();
            document.execCommand('copy');
            alert("Link berhasil disalin!");
        }

        function resetForm() {
            form.reset();
            fileName.innerText = "Pilih gambar dari perangkat...";
            fileName.classList.remove('text-white');
            result.classList.remove('opacity-100');
            setTimeout(() => result.classList.add('hidden'), 300);
        }
    </script>
</body>
</html>
