<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#6a0dad">
    <title>TeleCloud - Cyber Storage</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- VARIABLES & PALETTE --- */
        :root {
            --bg-color: #e0e0e0;
            --main-black: #0a0a0a;
            --card-bg: #ffffff;
            
            /* PALET WARNA CYBER */
            --accent-primary: #6a0dad;  /* Deep Electric Violet */
            --accent-secondary: #ccff00; /* Toxic Lime */
            --accent-tertiary: #ff5f00;  /* Industrial Orange */
            
            --border-width: 3px;
            --font-head: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-head);
            background-color: var(--bg-color);
            color: var(--main-black);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- DECORATION & NOISE --- */
        .bg-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04; pointer-events: none; z-index: -1;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjZmZmIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMwMDAiLz4KPC9zdmc+');
        }

        .floating-shape { position: fixed; z-index: -2; border: 2px solid var(--main-black); background: var(--accent-secondary); opacity: 0.6; }
        .shape-1 { width: 100px; height: 100px; top: 10%; left: -20px; border-radius: 50%; }
        .shape-2 { width: 150px; height: 150px; bottom: 20%; right: -40px; transform: rotate(45deg); background: var(--accent-primary); }

        /* --- MARQUEE TOP --- */
        .marquee-top {
            background: var(--main-black); color: var(--card-bg); padding: 8px 0;
            font-family: var(--font-mono); font-size: 0.7rem; font-weight: bold;
            border-bottom: var(--border-width) solid var(--accent-secondary);
            overflow: hidden; white-space: nowrap; position: fixed; top: 0; width: 100%; z-index: 999;
        }
        .marquee-content { display: inline-block; animation: scrollLeft 20s linear infinite; }
        .marquee-content span { margin-right: 25px; }
        .marquee-content i { margin: 0 8px; color: var(--accent-secondary); }
        @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- CONTAINER & CARD --- */
        .container { width: 100%; max-width: 500px; padding: 15px; margin-top: 30px; }

        .cyber-card {
            background: var(--card-bg); border: var(--border-width) solid var(--main-black);
            box-shadow: 8px 8px 0 var(--main-black); position: relative; overflow: hidden;
        }

        /* SCREW DECORATION */
        .cyber-card::before { content: '⬤'; position: absolute; top: 5px; left: 10px; font-size: 10px; color: rgba(0,0,0,0.3); pointer-events: none; }
        .cyber-card::after { content: '⬤'; position: absolute; bottom: 5px; right: 10px; font-size: 10px; color: rgba(0,0,0,0.3); pointer-events: none; }

        /* HEADER VISUAL */
        .card-header-visual {
            background: var(--accent-primary); padding: 15px; border-bottom: var(--border-width) solid var(--main-black);
            display: flex; justify-content: space-between; align-items: center;
        }
        .profile-section { display: flex; align-items: center; gap: 12px; }
        .avatar-img {
            width: 45px; height: 45px; border: 3px solid var(--main-black); background: #fff; border-radius: 12px;
            box-shadow: 4px 4px 0 var(--accent-secondary); display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
        }
        .profile-info { display: flex; flex-direction: column; }
        .user-role { font-family: var(--font-mono); font-size: 0.65rem; color: var(--accent-secondary); font-weight: bold; letter-spacing: 1px; }
        .user-action { font-weight: 900; color: #fff; font-size: 1rem; text-transform: uppercase; line-height: 1.1; }
        .decor-lines { font-family: var(--font-mono); color: rgba(255,255,255,0.3); font-weight: 900; font-size: 1.2rem; letter-spacing: -2px; }

        /* --- INPUT SECTION --- */
        .card-body { padding: 20px; }
        .input-wrapper { position: relative; margin-bottom: 15px; }
        .input-label { font-family: var(--font-mono); font-weight: bold; font-size: 0.75rem; margin-bottom: 5px; display: block; color: var(--main-black); }

        .cyber-input {
            width: 100%; padding: 12px; border: 3px solid var(--main-black); background: #f4f4f4;
            font-family: var(--font-mono); font-size: 0.9rem; font-weight: bold; outline: none; transition: 0.2s; color: var(--main-black);
        }
        .cyber-input:focus { background: #fff; border-color: var(--accent-tertiary); }
        
        .file-label {
            display: flex; align-items: center; justify-content: center; cursor: pointer; text-align: center; border-style: dashed;
        }
        .file-label:hover { background: #fff; border-color: var(--accent-primary); color: var(--accent-primary); }

        /* --- BUTTON UTAMA --- */
        .cyber-button {
            width: 100%; padding: 14px; border: 3px solid var(--main-black); background: var(--accent-secondary);
            color: var(--main-black); font-family: var(--font-head); font-weight: 900; font-size: 1.1rem;
            text-transform: uppercase; cursor: pointer; position: relative; overflow: hidden;
            box-shadow: 5px 5px 0 var(--main-black); transition: all 0.1s; margin-bottom: 8px; display: flex; justify-content: center; gap: 8px; align-items: center;
        }
        .cyber-button:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--main-black); }
        .cyber-button:hover { background: #bfff00; }
        .cyber-button:disabled { background: #ccc; cursor: not-allowed; box-shadow: 5px 5px 0 #888; border-color: #888; color: #555; transform: none; }
        .cyber-button.secondary { background: #fff; }
        
        /* NOTIFICATION */
        #notification {
            position: fixed; top: 60px; right: 15px; padding: 10px 18px; border: 3px solid var(--main-black); font-weight: 900;
            box-shadow: 5px 5px 0 var(--main-black); transform: translateX(200%); transition: transform 0.3s; z-index: 1002; max-width: 90%;
            font-family: var(--font-head); font-size: 0.85rem; background: var(--card-bg);
        }
        #notification.show { transform: translateX(0); }
        .notif-success { background: var(--accent-secondary) !important; color: var(--main-black); }
        .notif-error { background: var(--accent-tertiary) !important; color: white; }

        /* RESULT BOX */
        #resultBox { display: none; margin-top: 20px; padding-top: 20px; border-top: 3px dashed var(--main-black); }
    </style>
</head>
<body>

    <div class="bg-noise"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <div class="marquee-top">
        <div class="marquee-content">
            <span><i class="fas fa-bolt"></i> TELECLOUD STORAGE </span>
            <span><i class="fas fa-cube"></i> FREE IMAGE HOSTING </span>
            <span><i class="fas fa-network-wired"></i> SECURE CLOUD </span>
            <span><i class="fas fa-bolt"></i> TELECLOUD STORAGE </span>
            <span><i class="fas fa-cube"></i> FREE IMAGE HOSTING </span>
        </div>
    </div>

    <div class="container">
        <div class="cyber-card">
            
            <div class="card-header-visual">
                <div class="profile-section">
                    <div class="avatar-img"><i class="fas fa-cloud-upload-alt text-main-black"></i></div>
                    <div class="profile-info">
                        <span class="user-role">SYSTEM READY</span>
                        <span class="user-action">UPLOAD PORTAL</span>
                    </div>
                </div>
                <div class="decor-lines">///</div>
            </div>

            <div class="card-body">
                <form id="uploadForm">
                    <div class="input-wrapper">
                        <label class="input-label">📁 TARGET FILE</label>
                        <input type="file" id="fileInput" accept="image/*" class="hidden" style="display: none;" required>
                        <label for="fileInput" id="fileLabel" class="cyber-input file-label">
                            <i class="fas fa-folder-open" style="margin-right: 8px;"></i> SELECT IMAGE FILE
                        </label>
                    </div>

                    <button type="submit" id="btn" class="cyber-button">
                        <i class="fas fa-satellite-dish"></i> EXECUTE UPLOAD
                    </button>
                </form>

                <div id="resultBox">
                    <div class="input-wrapper">
                        <label class="input-label" style="color: var(--accent-primary);">✅ SUCCESS. LINK GENERATED:</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="urlInput" class="cyber-input" readonly>
                            <button onclick="copyText()" class="cyber-button secondary" style="width: 50px; margin: 0; padding: 0;">
                                <i class="far fa-copy"></i>
                            </button>
                        </div>
                    </div>
                    <a id="previewLink" href="#" target="_blank" style="text-decoration: none;">
                        <button class="cyber-button secondary" style="font-size: 0.9rem; padding: 10px;">
                            OPEN NEW TAB <i class="fas fa-external-link-alt" style="margin-left: 5px;"></i>
                        </button>
                    </a>
                    <button onclick="resetForm()" class="cyber-button" style="background: var(--main-black); color: white; font-size: 0.9rem; padding: 10px;">
                        UPLOAD NEW FILE
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div id="notification"></div>

    <script>
        const input = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const form = document.getElementById('uploadForm');
        const btn = document.getElementById('btn');
        const resultBox = document.getElementById('resultBox');
        const urlInput = document.getElementById('urlInput');
        const previewLink = document.getElementById('previewLink');

        // Notification function ala Cyber theme
        function showNotification(text, type = 'success') {
            const n = document.getElementById('notification');
            n.innerHTML = type === 'success' ? `<i class="fas fa-check-circle"></i> ${text}` : `<i class="fas fa-exclamation-triangle"></i> ${text}`;
            n.className = `notif-${type} show`;
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        // Ubah teks saat gambar dipilih
        input.onchange = () => { 
            if(input.files[0]) {
                fileLabel.innerHTML = `<i class="fas fa-file-image" style="margin-right: 8px;"></i> ${input.files[0].name}`;
                fileLabel.style.borderColor = "var(--accent-primary)";
            } 
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // State Loading
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> TRANSMITTING...`;
            resultBox.style.display = 'none';

            const fd = new FormData();
            fd.append('image', input.files[0]);

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                
                if(data.url) {
                    urlInput.value = data.url;
                    previewLink.href = data.url;
                    
                    // Show Result
                    resultBox.style.display = 'block';
                    showNotification('UPLOAD COMPLETE!', 'success');
                } else {
                    showNotification('ERROR: FAILED TO GET LINK', 'error');
                }
            } catch (err) { 
                showNotification('ERROR: CONNECTION LOST', 'error');
            } finally {
                // Restore Button
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-satellite-dish"></i> EXECUTE UPLOAD`;
            }
        };

        function copyText() {
            urlInput.select();
            document.execCommand('copy');
            showNotification('LINK COPIED TO CLIPBOARD', 'success');
        }

        function resetForm() {
            form.reset();
            fileLabel.innerHTML = `<i class="fas fa-folder-open" style="margin-right: 8px;"></i> SELECT IMAGE FILE`;
            fileLabel.style.borderColor = "var(--main-black)";
            resultBox.style.display = 'none';
        }
    </script>
</body>
</html>
